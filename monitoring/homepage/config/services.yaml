---
# ---------------------------------
# --- GLANCES METRICS - prod-deb-01 ---
# ---------------------------------
- prod-deb-01: 
    - prod-deb-01: 
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:61208
            metric: info
            version: 4
            chart: true
    - CPU Temp:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:61208
            metric: sensor:Package id 0
            version: 4
            chart: true       # Default is true. Set to false for text-only.
    - Network:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:61208
            label: prod-deb-01
            metric: network:eno1      
            version: 4        # Required if you are running Glances v4+
            chart: true       # Default is true. Set to false for text-only.
    - Disk I/O:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:61208
            label: prod-deb-01
            metric: disk:sda
            version: 4        # Required if you are running Glances v4+
            chart: true       # Default is true. Set to false for text-only.
            
# ---------------------------------
# --- Glances METRICS - Jupiter --- 
# ---------------------------------
- Jupiter:  
    - Jupiter: 
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_JUPITER_IP}}:61208
            metric: info
            version: 4
            chart: true
    - CPU Temp.:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_JUPITER_IP}}:61208
            metric: sensor:Package id 0
            version: 4
            chart: true       # Default is true. Set to false for text-only.
    - Network.:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_JUPITER_IP}}:61208
            label: Jupiter
            metric: network:eno1    
            version: 4       # Required if you are running Glances v4+
            chart: true       # Default is true. Set to false for text-only.
    - /mnt/storage:
        widget:
            type: glances
            url: http://{{HOMEPAGE_VAR_JUPITER_IP}}:61208
            label: Jupiter
            metric: fs:/mnt/storage
            version: 4        # Required if you are running Glances v4+
            chart: true       # Default is true. Set to false for text-only.

# -------------------------
# --- ROW 1: MANAGEMENT ---
# -------------------------
- Management:
        
    - NGINX Proxy Manager:
        icon: npm.svg
        href: "http://npm.{{HOMEPAGE_VAR_URLBASE}}"
        description: 
        server: local 
        container: npm
        widget:
            type: npm
            url: "http://prod-deb-01.internal:81"
            username: "{{HOMEPAGE_VAR_NPM_USER}}"
            password: "{{HOMEPAGE_VAR_NPM_PASS}}"
    - Backrest:
        icon: backrest.png
        href: "http://backrest.{{HOMEPAGE_VAR_URLBASE}}"
        description: Backup Manager
        widget:
            type: backrest
            url: http://backrest.{{HOMEPAGE_VAR_URLBASE}}
            # username: "{{HOMEPAGE_VAR_BACKREST_USER}}"
            # password: "{{HOMEPAGE_VAR_BACKREST_PASS}}"
# -------------------------
# --- ROW 2: MONITORING ---
# -------------------------
- Monitoring:
    - Dozzle:
        icon: dozzle.svg
        href: "http://dozzle.{{HOMEPAGE_VAR_URLBASE}}"
        description: Log Viewer
        server: local
        container: dozzle
    - Uptime Kuma:
        icon: uptime-kuma.svg
        href: "http://kuma.{{HOMEPAGE_VAR_URLBASE}}"
        description: prod-deb-01.internal
        server: local
        container: uptime-kuma
        widget:
            type: uptimekuma
            url: "http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:3001"
            slug: prod-deb-01
            
        
    - Beszel - prod-deb-01:
            icon: beszel.png
            href: "https://beszel.{{HOMEPAGE_VAR_URLBASE}}"
            description: System Monitor
            server: local
            container: beszel-hub
            widget:
               type: beszel
               url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:8090
               username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
               password: "{{HOMEPAGE_VAR_BESZEL_PASS}}"
               systemId: prod-deb-01
               version: 2
               fields: ["disk", "network", "cpu", "memory"] 
    - Beszel - Jupiter:
            icon: beszel.png
            href: "https://beszel.{{HOMEPAGE_VAR_URLBASE}}"
            description: System Monitor
            server: local
            container: beszel-hub
            widget:
               type: beszel
               url: http://{{HOMEPAGE_VAR_prod-deb-01_IP}}:8090
               username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
               password: "{{HOMEPAGE_VAR_BESZEL_PASS}}"
               systemId: jupiter
               version: 2
               fields: ["disk", "network", "cpu", "memory"] 


# -------------------------
# --- ROW 3: NETWORKING ---
# -------------------------
- Networking:
    - OPNSense :
        icon: opnsense.svg
        href: "https://192.168.0.1:4043/"
        description: OPNSense 
        widget:
          type: opnsense
          url: "https://192.168.0.1:4043/"
          username: "{{HOMEPAGE_VAR_OPNSENSE_USER}}"
          password: "{{HOMEPAGE_VAR_OPNSENSE_PASS}}"
          wan: opt1 # optional, defaults to wan
    - Adguard Home:
        icon: adguard.svg
        href: "http://{{HOMEPAGE_VAR_OPNSENSE_IP}}:3000"
        description: Adguard Home DNS * Ad Blocker 
        widget:
          type: adguard
          url: http://{{HOMEPAGE_VAR_OPNSENSE_IP}}:3000
          username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
          wan: opt1 # optional, defaults to wan
    - Omada Controller:
        icon: omada.svg
        href: "https://omada.{{HOMEPAGE_VAR_URLBASE}}"
        description: Network Admin
        server: local
        container: omada-controller
        widget:
            type: omada
            url: "https://{{HOMEPAGE_VAR_prod-deb-01_IP}}:8043"
            username: "{{HOMEPAGE_VAR_OMADA_USER}}"
            password: "{{HOMEPAGE_VAR_OMADA_PASS}}"
            site: "{{HOMEPAGE_VAR_OMADA_SITE}}"

    - Tailscale:
        icon: tailscale.svg
        href: "https://login.tailscale.com/admin/machines"
        description: VPN Mesh
        widget:
            type: tailscale
            deviceid: "{{HOMEPAGE_VAR_TAILSCALE_ID}}"
            key: "{{HOMEPAGE_VAR_TAILSCALE_KEY}}"
            fields: ["status", "last_seen"]
    - Ntopng:
        icon: ntopng.svg
        href: "http://ntopng.{{HOMEPAGE_VAR_URLBASE}}"
        description: Network Traffic Monitor
        widget:
            type: ntopng
            url: "http://ntopng.{{HOMEPAGE_VAR_URLBASE}}"
            username: "{{HOMEPAGE_VAR_NTOPNG_USER}}"
            password: "{{HOMEPAGE_VAR_NTOPNG_PASS}}"

