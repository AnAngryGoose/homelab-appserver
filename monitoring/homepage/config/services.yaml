# ---------------------
# --- Row 5: Media ----
# ---------------------
- Media:
    - Plex: 
        icon: plex.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:32400"
        description: Plex Media server
        widget: 
            type: plex
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:32400"
            key: "{{HOMEPAGE_VAR_PLEX_CLAIM}}"
    - Radarr: 
        icon: radarr.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:7878"
        description: Arr - Movies
        widget: 
            type: radarr
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:7878"
            key: "{{HOMEPAGE_VAR_RADARR_TOKEN}}"
            enableQueue: false # optional, defaults to false
            # Allowed fields: ["wanted", "missing", "queued", "movies"].
    - Sonarr: 
        icon: sonarr.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:8989"
        description: Arr - TV
        widget: 
            type: sonarr
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:8989"
            key: "{{HOMEPAGE_VAR_SONARR_TOKEN}}"
            enableQueue: false # optional, defaults to false
            # Allowed fields: ["wanted", "queued", "series"].
    - Prowlarr: 
        icon: prowlarr.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:9696"
        description: Arr - Manager
        widget: 
            type: prowlarr
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:9696"
            key: "{{HOMEPAGE_VAR_PROWLARR_TOKEN}}"
            # Allowed fields: ["numberOfGrabs", "numberOfQueries", "numberOfFailGrabs", "numberOfFailQueries"].
    - Seerr: 
        icon: overseerr.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:5055"
        description: Arr Request Manager
        widget: 
            type: overseerr
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:5055"
            key: "{{HOMEPAGE_VAR_OVERSEER_TOKEN}}"
            # Allowed fields: ["pending", "approved", "available", "processing"].    
    - qBittorrent: 
        icon: qbittorrent.svg
        href: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:8080"
        description: qBittorrent - Torrent Client
        widget:
            type: qbittorrent
            url: "http://{{HOMEPAGE_VAR_JUPITER_IP}}:8080"
            username: "{{HOMEPAGE_VAR_QBIT_USER}}"
            password: "{{HOMEPAGE_VAR_QBIT_PASS}}"
            enableLeechProgress: false # optional, defaults to false
            enableLeechSize: true # optional, defaults to false
            # Allowed fields: ["leech", "download", "seed", "upload"].


