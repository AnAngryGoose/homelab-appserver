services:
  samba:
    image: dockurr/samba
    container_name: samba
    restart: always
    environment:
      NAME: "prod-deb-01-samba"
      USER: "goose"
      PASS: ${SAMBAPASS}
      GID: "1000"
    ports:
      - 445:445
    volumes:
      # MergerFS Pool
      - /mnt/appdata/samba/share:/share
      - /home/goose:/home
